name: Generate and Release Documentation

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Dependencies
        run: npm ci
      - name: Build with JSDoc
        run: npm run docs
      - name: Prepare deployment directory
        run: |
          mkdir -p deploy/api
          cp -r docs/* deploy/api/
      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages-current
      - name: Merge with existing gh-pages content
        run: |
          cp -rn gh-pages-current/* deploy/ 2>/dev/null || true
          rm -rf gh-pages-current
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy

name: 'Stage E2E tests'

on:
  push:      # TESTING
    branches:
      - e2e-ci
  schedule:
    - cron: '0 0 * * *' # This cron expression runs the action every 24 hours at midnight UTC
    
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # target branch
  cancel-in-progress: true

jobs:
  playwright-integration-tests:
    runs-on:
      - codebuild-host-inventory-frontend-${{ github.run_id }}-${{ github.run_attempt }}
      - instance-size:large
      - buildspec-override:true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Cache - node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules 
            dist
          key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-node-modules-

      - name: Install dependencies
        run: 'npm ci'

      - name: Setup Playwright
        run: npx playwright install --with-deps

      - name: Create front-end .env file
        run: |
          # Check if the secrets are set
          if [ -z "$PLAYWRIGHT_USER" ]; then
            echo "Error: PLAYWRIGHT_USER secret is not set."
            exit 1
          fi

          if [ -z "$PLAYWRIGHT_PASSWORD" ]; then
            echo "Error: PLAYWRIGHT_PASSWORD secret is not set."
            exit 1
          fi

          # Create the .env file and write the secrets and other variables to it
          {
            echo "PLAYWRIGHT_USER=$PLAYWRIGHT_USER"
            echo "PLAYWRIGHT_PASSWORD=$PLAYWRIGHT_PASSWORD"
            echo "CI=true"
            echo "INTEGRATION=true"
            echo "RH_CLIENT_PROXY=\"$RH_PROXY_URL\""
            # Use the Stage URL for nightly runs
            echo "BASE_URL=$STAGE_BASE_URL" 
            echo "PROXY=$RH_PROXY_URL"
            # Satisfy the "Missing Var" error with dummy values if not used
            echo "ORG_ID_1=nightly_dummy"
            echo "ACTIVATION_KEY_1=nightly_dummy"
          } >> .env 2>/dev/null

          echo ".env file created successfully."

      - name: Run front-end Playwright tests
        run: USE_CTRF=1 CURRENTS_PROJECT_ID=ER8tBy CURRENTS_RECORD_KEY=$CURRENTS_RECORD_KEY CURRENTS_CI_BUILD_ID="${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}" npx playwright test

      - name: Publish front-end Test Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './playwright-ctrf/playwright-ctrf.json'
        if: ${{ !cancelled() }}

      - name: Store front-end Test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 10
